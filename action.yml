name: 'github-actions-opentelemetry'
description: 'A GitHub Action that sends telemetry data by OpenTelemetry'
author: '35333687+paper2@users.noreply.github.com'

branding:
  icon: 'heart'
  color: 'red'

inputs:
  GITHUB_TOKEN:
    description: 'GitHub token for client authentication'
    required: true

outputs:
  trace-id:
    description:
      'The OpenTelemetry trace ID generated for the workflow (empty string if no
      trace was created)'

runs:
  using: node24
  main: dist/index.js
